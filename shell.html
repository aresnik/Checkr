<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Lock viewport to prevent pinch-zooming and scrolling on mobile -->
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- Apple iOS Native App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Checkr">

    <!-- App Icons and Manifest -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">

    <title>Checkr Web</title>

    <!-- Bulletproof PWA Standalone Detection (iOS & Android) -->
    <script>
        if (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
            document.documentElement.classList.add('is-pwa');
        }
    </script>

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Game Canvas */
        #canvas {
            /* Dynamic responsive scaling for itch.io iframe, popups, and desktop */
            width: 100% !important;
            height: auto !important;
            max-width: 50vh !important;
            max-width: 50dvh !important;
            max-height: 100vh !important;
            max-height: 100dvh !important;
            aspect-ratio: 1 / 2 !important;
            object-fit: contain !important;
            background-color: #000000;
            /* Prevent text selection cursor on canvas */
            user-select: none;
            -webkit-user-select: none;
            outline: none;
            border: none !important;
            padding: 0 !important;
            display: block !important;
        }

        /* PWA Standalone Mode (Home Screen App) */
        html.is-pwa,
        html.is-pwa body {
            background-color: #000000 !important;
        }

        html.is-pwa #canvas {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            max-width: 100vw !important;
            max-height: 100dvh !important;
            width: 100vw !important;
            height: 100dvh !important;
            aspect-ratio: auto !important;
            object-fit: fill !important;
        }

        /* Loading Spinner & Status overlay */
        #loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            z-index: 10;
            background-color: rgba(43, 43, 43, 0.9);
            padding: 30px;
            border-radius: 10px;
        }

        #spinner {
            height: 50px;
            width: 50px;
            border: 5px solid #555;
            border-top: 5px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        #status {
            font-size: 18px;
            font-weight: bold;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Loading Screen Overlay -->
    <div id="loading-container">
        <div id="spinner"></div>
        <div id="status">Downloading...</div>
    </div>

    <!-- The actual game canvas -->
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <!-- Emscripten JavaScript Hooks -->
    <script type='text/javascript'>
        var statusElement = document.getElementById('status');
        var spinnerElement = document.getElementById('spinner');
        var loadingContainer = document.getElementById('loading-container');

        var Module = {
            canvas: (function () {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", function (e) {
                    alert('WebGL context lost. You will need to reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            setStatus: function (text) {
                if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
                if (text === Module.setStatus.last.text) return;
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                var now = Date.now();
                // If this is a progress update, skip it if it's too soon (prevents UI lag)
                if (m && now - Module.setStatus.last.time < 30) return;
                Module.setStatus.last.time = now;
                Module.setStatus.last.text = text;

                if (m) {
                    text = m[1]; // Get the progress action word
                }

                if (text) {
                    statusElement.innerHTML = text;
                } else {
                    // Emscripten passes an empty string when the download and instantiation are complete
                    loadingContainer.style.display = 'none';
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function (left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
            }
        };

        Module.setStatus('Downloading...');

        window.onerror = function (event) {
            Module.setStatus('Exception thrown, see JavaScript console');
            spinnerElement.style.display = 'none';
            Module.setStatus = function (text) {
                if (text) console.error('[post-exception status] ' + text);
            };
        };

        // Synchronous click listener to bypass popup blockers for external links
        document.getElementById('canvas').addEventListener('click', function (e) {
            var canvas = e.target;
            var rect = canvas.getBoundingClientRect();

            var logicalX = e.clientX - rect.left;
            var logicalY = e.clientY - rect.top;

            // Calculate dynamic UI sizes matching mainMenuScene.cpp
            var w = rect.width;
            var h = rect.height;
            var minDim = Math.min(w, h);

            var bottomBtnSize = minDim * 0.15;
            var spacing = w * 0.05;
            var totalBottomW = (bottomBtnSize * 3.0) + (spacing * 2.0);
            var startX = (w - totalBottomW) / 2.0;
            var y = h - bottomBtnSize - (h * 0.05);

            // Home Button bounds
            var homeX = startX + bottomBtnSize + spacing;
            if (logicalX >= homeX && logicalX <= homeX + bottomBtnSize && logicalY >= y && logicalY <= y + bottomBtnSize) {
                window.open('https://glassoniongames.com', '_blank');
            }

            // Privacy Button bounds
            var privX = startX + (bottomBtnSize * 2.0) + (spacing * 2.0);
            if (logicalX >= privX && logicalX <= privX + bottomBtnSize && logicalY >= y && logicalY <= y + bottomBtnSize) {
                window.open('https://glassoniongames.com/privacy-policy/', '_blank');
            }
        });
    </script>

    <!-- Emscripten injects the compiled JS tags here -->
    {{{ SCRIPT }}}

</body>

</html>
